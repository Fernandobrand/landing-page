<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD: A Divergent Journey</title>
    <style>
        /* Reset básico para não herdar lixo do resto do site */
        #adhd-app-root {
            all: initial; 
            display: block;
            background-color: #0d0221;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00f2ff;
        }

        .viewer-box {
            position: relative;
            width: 95%;
            max-width: 1100px;
            aspect-ratio: 16 / 9; /* Mantém a proporção dos seus slides */
            border: 3px solid #bc00dd;
            box-shadow: 0 0 30px rgba(188, 0, 221, 0.4);
            background: #000;
            display: flex;
            flex-direction: column;
        }

        .slide-stage {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide-stage img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garante que a imagem apareça inteira */
            display: none;
            animation: glitchFade 0.4s ease-out;
        }

        .slide-stage img.active {
            display: block;
        }

        /* Barra de Controle Inferior */
        .controls {
            height: 60px;
            background: rgba(20, 0, 40, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-top: 2px solid #bc00dd;
        }

        .btn {
            background: transparent;
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00f2ff;
            color: #0d0221;
            box-shadow: 0 0 15px #00f2ff;
        }

        .counter {
            font-family: monospace;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #00f2ff;
        }

        @keyframes glitchFade {
            0% { opacity: 0; transform: scale(1.02); filter: hue-rotate(90deg); }
            100% { opacity: 1; transform: scale(1); filter: hue-rotate(0deg); }
        }
    </style>
</head>
<body>

<div id="adhd-app-root">
    <div class="viewer-box">
        <div class="slide-stage" id="stage">
            <img src="slide1.png" class="active" alt="Intro">
            <img src="slide2.png" alt="ADHD Types">
            <img src="slide3.png" alt="Creativity Mode">
            <img src="slide4.png" alt="All in">
            <img src="slide5.png" alt="Max wide atation to new income">
            <img src="slide6.png" alt="The Balance">
        </div>

        <div class="controls">
            <button class="btn" onclick="nav(-1)">◄ PREVIOUS</button>
            <div class="counter" id="idx">01 / 06</div>
            <button class="btn" onclick="nav(1)">NEXT ►</button>
        </div>
    </div>
</div>

<script>
    let current = 0;
    const images = document.querySelectorAll('#stage img');
    const counter = document.getElementById('idx');

    function nav(dir) {
        images[current].classList.remove('active');
        current = (current + dir + images.length) % images.length;
        images[current].classList.add('active');
        
        // Atualiza o contador com zero à esquerda
        let displayIdx = (current + 1).toString().padStart(2, '0');
        counter.innerText = `${displayIdx} / 06`;
    }

    // Atalhos do teclado
    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") nav(-1);
        if (e.key === "ArrowRight") nav(1);
    });
</script>

</body>
</html>
